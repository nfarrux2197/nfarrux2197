<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; }

      @keyframes growBar {
        from { width: 0 }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(6px) }
        to   { opacity: 1; transform: translateY(0) }
      }
      @keyframes shimmer {
        0%   { transform: translateX(-100%) }
        100% { transform: translateX(400%)  }
      }

      .bar-py  { animation: growBar .9s ease .4s both; }
      .bar-dj  { animation: growBar .9s ease .55s both; }
      .bar-fl  { animation: growBar .9s ease .7s both; }
      .bar-dk  { animation: growBar .9s ease .85s both; }
      .bar-pg  { animation: growBar .9s ease 1.0s both; }
      .bar-rd  { animation: growBar .9s ease 1.15s both; }

      .row1 { animation: fadeUp .5s ease .4s both; }
      .row2 { animation: fadeUp .5s ease .55s both; }
      .row3 { animation: fadeUp .5s ease .7s both; }
      .row4 { animation: fadeUp .5s ease .85s both; }
      .row5 { animation: fadeUp .5s ease 1.0s both; }
      .row6 { animation: fadeUp .5s ease 1.15s both; }

      .sh { animation: shimmer 3s ease-in-out 1.5s infinite; }
    </style>
    <clipPath id="c-py"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
    <clipPath id="c-dj"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
    <clipPath id="c-fl"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
    <clipPath id="c-dk"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
    <clipPath id="c-pg"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
    <clipPath id="c-rd"><rect x="0" y="0" width="380" height="10" rx="5"/></clipPath>
  </defs>

  <rect width="800" height="200" fill="#05070f" rx="12"/>
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="#1a2040" stroke-width="1" rx="12"/>

  <!-- Section title -->
  <text class="mono" x="24" y="30" font-size="9" fill="#5a6490" letter-spacing=".15em">◆ SKILL ATTRIBUTES</text>
  <line x1="180" y1="26" x2="776" y2="26" stroke="#1a2040" stroke-width="1"/>

  <!-- Labels column -->
  <g class="row1">
    <text class="mono" x="24" y="60" font-size="10" fill="#60a5fa">Python</text>
    <text class="mono" x="118" y="60" font-size="9" fill="#5a6490">95</text>
  </g>
  <g class="row2">
    <text class="mono" x="24" y="88" font-size="10" fill="#6ee7b7">Django</text>
    <text class="mono" x="118" y="88" font-size="9" fill="#5a6490">88</text>
  </g>
  <g class="row3">
    <text class="mono" x="24" y="116" font-size="10" fill="#d1d5db">Flask</text>
    <text class="mono" x="118" y="116" font-size="9" fill="#5a6490">80</text>
  </g>
  <g class="row4">
    <text class="mono" x="24" y="144" font-size="10" fill="#38bdf8">Docker</text>
    <text class="mono" x="118" y="144" font-size="9" fill="#5a6490">80</text>
  </g>
  <g class="row5">
    <text class="mono" x="24" y="172" font-size="10" fill="#a78bfa">PostgreSQL</text>
    <text class="mono" x="118" y="172" font-size="9" fill="#5a6490">85</text>
  </g>

  <!-- Right column -->
  <g class="row1">
    <text class="mono" x="420" y="60" font-size="10" fill="#fb923c">Redis</text>
    <text class="mono" x="538" y="60" font-size="9" fill="#5a6490">72</text>
  </g>
  <g class="row2">
    <text class="mono" x="420" y="88" font-size="10" fill="#f472b6">MySQL</text>
    <text class="mono" x="538" y="88" font-size="9" fill="#5a6490">78</text>
  </g>
  <g class="row3">
    <text class="mono" x="420" y="116" font-size="10" fill="#fbbf24">JavaScript</text>
    <text class="mono" x="538" y="116" font-size="9" fill="#5a6490">65</text>
  </g>
  <g class="row4">
    <text class="mono" x="420" y="144" font-size="10" fill="#34d399">Git</text>
    <text class="mono" x="538" y="144" font-size="9" fill="#5a6490">88</text>
  </g>
  <g class="row5">
    <text class="mono" x="420" y="172" font-size="10" fill="#94a3b8">C / C++</text>
    <text class="mono" x="538" y="172" font-size="9" fill="#5a6490">70</text>
  </g>

  <!-- Left bars -->
  <!-- Python -->
  <rect x="140" y="50" width="240" height="10" rx="5" fill="#0d1224"/>
  <g transform="translate(140,50)" clip-path="url(#c-py)">
    <rect y="0" height="10" rx="5" fill="#3b82f6" width="228" class="bar-py"/>
    <rect y="0" height="10" width="60" fill="rgba(255,255,255,.08)" class="sh"/>
  </g>

  <!-- Django -->
  <rect x="140" y="78" width="240" height="10" rx="5" fill="#0d1224"/>
  <g transform="translate(140,78)" clip-path="url(#c-dj)">
    <rect y="0" height="10" rx="5" fill="#10b981" width="211" class="bar-dj"/>
  </g>

  <!-- Flask -->
  <rect x="140" y="106" width="240" height="10" rx="5" fill="#0d1224"/>
  <g transform="translate(140,106)" clip-path="url(#c-fl)">
    <rect y="0" height="10" rx="5" fill="#9ca3af" width="192" class="bar-fl"/>
  </g>

  <!-- Docker -->
  <rect x="140" y="134" width="240" height="10" rx="5" fill="#0d1224"/>
  <g transform="translate(140,134)" clip-path="url(#c-dk)">
    <rect y="0" height="10" rx="5" fill="#0ea5e9" width="192" class="bar-dk"/>
  </g>

  <!-- PostgreSQL -->
  <rect x="140" y="162" width="240" height="10" rx="5" fill="#0d1224"/>
  <g transform="translate(140,162)" clip-path="url(#c-pg)">
    <rect y="0" height="10" rx="5" fill="#8b5cf6" width="204" class="bar-pg"/>
  </g>

  <!-- Right bars -->
  <!-- Redis -->
  <rect x="556" y="50" width="220" height="10" rx="5" fill="#0d1224"/>
  <rect x="556" y="50" height="10" rx="5" fill="#f97316" width="158" class="bar-py"/>

  <!-- MySQL -->
  <rect x="556" y="78" width="220" height="10" rx="5" fill="#0d1224"/>
  <rect x="556" y="78" height="10" rx="5" fill="#ec4899" width="172" class="bar-dj"/>

  <!-- JS -->
  <rect x="556" y="106" width="220" height="10" rx="5" fill="#0d1224"/>
  <rect x="556" y="106" height="10" rx="5" fill="#eab308" width="143" class="bar-fl"/>

  <!-- Git -->
  <rect x="556" y="134" width="220" height="10" rx="5" fill="#0d1224"/>
  <rect x="556" y="134" height="10" rx="5" fill="#34d399" width="194" class="bar-dk"/>

  <!-- C/C++ -->
  <rect x="556" y="162" width="220" height="10" rx="5" fill="#0d1224"/>
  <rect x="556" y="162" height="10" rx="5" fill="#94a3b8" width="154" class="bar-pg"/>

  <!-- Vertical divider -->
  <line x1="400" y1="40" x2="400" y2="185" stroke="#1a2040" stroke-width="1" stroke-dasharray="4 4"/>
</svg>
