  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', monospace; }

      @keyframes fadeIn {
        from { opacity: 0 } to { opacity: 1 }
      }
      @keyframes snakeMove {
        0%   { offset-distance: 0%   }
        100% { offset-distance: 100% }
      }
      @keyframes snakeGlow {
        0%,100% { opacity: .9 }
        50%      { opacity: 1  }
      }
      @keyframes eatCell {
        0%,100% { r: 4 }
        50%      { r: 6 }
      }

      .grid-cell { animation: fadeIn .3s ease both; }

      .snake-head {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear infinite, snakeGlow 1s ease-in-out infinite;
        offset-rotate: auto;
      }
      .snake-body1 {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear -.3s infinite;
      }
      .snake-body2 {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear -.6s infinite;
      }
      .snake-body3 {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear -.9s infinite;
      }
      .snake-body4 {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear -1.2s infinite;
      }
      .snake-tail {
        offset-path: path("M 36 32 L 756 32 L 756 52 L 36 52 L 36 72 L 756 72 L 756 92 L 36 92");
        animation: snakeMove 6s linear -1.5s infinite;
      }
    </style>
